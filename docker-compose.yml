services:

  bestfly-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bestfly-backend
    restart: unless-stopped
    env_file: .env
    networks:
      - internal
    labels:
      - "traefik.enable=false"   # backend is internal only; nginx proxies it

  bestfly-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bestfly-frontend
    restart: unless-stopped
    depends_on:
      - bestfly-backend
    networks:
      - internal
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      # ── Router ──────────────────────────────────────────────────────────
      - "traefik.http.routers.bestfly.rule=Host(`fly.boxbid.com.br`)"
      - "traefik.http.routers.bestfly.entrypoints=websecure"
      - "traefik.http.routers.bestfly.tls=true"
      - "traefik.http.routers.bestfly.tls.certresolver=letsencrypt"
      # ── Service ─────────────────────────────────────────────────────────
      - "traefik.http.services.bestfly.loadbalancer.server.port=80"
      # ── HTTP → HTTPS redirect ────────────────────────────────────────────
      - "traefik.http.routers.bestfly-http.rule=Host(`fly.boxbid.com.br`)"
      - "traefik.http.routers.bestfly-http.entrypoints=web"
      - "traefik.http.routers.bestfly-http.middlewares=redirect-to-https@file"

networks:
  internal:
    driver: bridge
  traefik_proxy:
    external: true
