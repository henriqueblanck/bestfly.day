services:

  bestfly-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bestfly-backend
    restart: unless-stopped
    environment:
      - POLL_INTERVAL_SECONDS=2
      - POLL_TIMEOUT_SECONDS=300
    networks:
      - internal
    labels:
      - "traefik.enable=false"   # backend is internal only; nginx proxies it

  bestfly-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bestfly-frontend
    restart: unless-stopped
    depends_on:
      - bestfly-backend
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # ── Router ──────────────────────────────────────────────────────────
      - "traefik.http.routers.bestfly.rule=Host(`fly.zyia.com.br`)"
      - "traefik.http.routers.bestfly.entrypoints=websecure"
      - "traefik.http.routers.bestfly.tls=true"
      - "traefik.http.routers.bestfly.tls.certresolver=letsencrypt"
      # ── Service ─────────────────────────────────────────────────────────
      - "traefik.http.services.bestfly.loadbalancer.server.port=80"
      # ── HTTP → HTTPS redirect ────────────────────────────────────────────
      - "traefik.http.routers.bestfly-http.rule=Host(`fly.zyia.com.br`)"
      - "traefik.http.routers.bestfly-http.entrypoints=web"
      - "traefik.http.routers.bestfly-http.middlewares=redirect-to-https@file"

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true
