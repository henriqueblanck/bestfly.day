<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BestFly — Stop overpaying for flights</title>
    <meta name="description" content="Split-ticket price intelligence. Find flight loopholes the airlines don't want you to know about." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root, [data-theme="dark"] {
        /* Surfaces */
        --bg:        #08080F;
        --bg-2:      #0B0B16;
        --surface:   #12121F;
        --surface-2: #181826;
        --line:      rgba(255,255,255,0.07);
        --line-2:    rgba(255,255,255,0.12);
        /* Text */
        --ink:   #ECECF5;
        --ink-2: #9A9AB0;
        --ink-3: #5C5C72;
        /* Accents */
        --green:       #00FF88;
        --green-dim:   #00cc6e;
        --green-glow:  rgba(0,255,136,0.22);
        --green-bg:    rgba(0,255,136,0.10);
        --crimson:     #FF4D63;
        --crimson-dim: #b3324a;
        --amber:       #FFC83D;
        --on-accent:   #04150c;
        --red:         #FF4D63;
        --red-bg:      rgba(255,77,99,0.10);
        --yellow:      #FFC83D;
        --terminal-bg: #050510;
        /* Heat ramp */
        --heat-0: #00FF88;
        --heat-1: #7CF06B;
        --heat-2: #D6E84F;
        --heat-3: #FFC83D;
        --heat-4: #FF8A4D;
        --heat-5: #FF4D63;
        /* Type */
        --font: 'Space Grotesk', system-ui, sans-serif;
        --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
        /* Radius */
        --r-sm:   8px;
        --r-md:   12px;
        --r-lg:   18px;
        --r-pill: 999px;
        /* Legacy aliases */
        --bg-card:       var(--surface);
        --bg-elevated:   var(--surface-2);
        --border:        var(--line);
        --border-bright: var(--line-2);
        --text:          var(--ink);
        --muted:         var(--ink-3);
        --muted2:        var(--ink-2);
      }
      /* ── Mint ───── */
      [data-theme="mint"] {
        --bg: #0A0F12; --bg-2: #0D1419; --surface: #121C21; --surface-2: #19262C;
        --line: rgba(255,255,255,0.07); --line-2: rgba(180,230,215,0.14);
        --ink: #EAF2F0; --ink-2: #93A8A6; --ink-3: #5C7072;
        --green: #2FE3A3; --green-dim: #1fbf86; --green-glow: rgba(47,227,163,0.20); --green-bg: rgba(47,227,163,0.10);
        --crimson: #FF6585; --crimson-dim: #b34a5f; --amber: #FFCB57; --on-accent: #042018;
        --red: #FF6585; --red-bg: rgba(255,101,133,0.10); --yellow: #FFCB57; --terminal-bg: #060c0f;
        --heat-0: #2FE3A3; --heat-1: #78E096; --heat-2: #D6E064; --heat-3: #FFCB57; --heat-4: #FF8C5A; --heat-5: #FF6585;
        --bg-card: var(--surface); --bg-elevated: var(--surface-2); --border: var(--line); --border-bright: var(--line-2);
        --text: var(--ink); --muted: var(--ink-3); --muted2: var(--ink-2);
      }
      /* ── Lime ───── */
      [data-theme="lime"] {
        --bg: #0C0D08; --bg-2: #10110A; --surface: #16170E; --surface-2: #202213;
        --line: rgba(255,255,255,0.07); --line-2: rgba(220,240,160,0.14);
        --ink: #F2F3E9; --ink-2: #A4A795; --ink-3: #64664F;
        --green: #CDFF4A; --green-dim: #a8e000; --green-glow: rgba(205,255,74,0.20); --green-bg: rgba(205,255,74,0.10);
        --crimson: #FF6B5A; --crimson-dim: #b3463a; --amber: #FFD23D; --on-accent: #14160A;
        --red: #FF6B5A; --red-bg: rgba(255,107,90,0.10); --yellow: #FFD23D; --terminal-bg: #090a06;
        --heat-0: #CDFF4A; --heat-1: #D6E84F; --heat-2: #FFD23D; --heat-3: #FFAA3C; --heat-4: #FF7846; --heat-5: #FF6B5A;
        --bg-card: var(--surface); --bg-elevated: var(--surface-2); --border: var(--line); --border-bright: var(--line-2);
        --text: var(--ink); --muted: var(--ink-3); --muted2: var(--ink-2);
      }
      /* ── Cyan ───── */
      [data-theme="cyan"] {
        --bg: #070B12; --bg-2: #0A0F18; --surface: #0F1722; --surface-2: #16212F;
        --line: rgba(255,255,255,0.07); --line-2: rgba(160,210,235,0.14);
        --ink: #E7EEF6; --ink-2: #92A2B3; --ink-3: #58697A;
        --green: #38E1FF; --green-dim: #14c2e6; --green-glow: rgba(56,225,255,0.20); --green-bg: rgba(56,225,255,0.10);
        --crimson: #FF5C8A; --crimson-dim: #b3415f; --amber: #FFC44D; --on-accent: #04222B;
        --red: #FF5C8A; --red-bg: rgba(255,92,138,0.10); --yellow: #FFC44D; --terminal-bg: #050810;
        --heat-0: #38E1FF; --heat-1: #50DCC8; --heat-2: #AADC6E; --heat-3: #FFC84D; --heat-4: #FF8C5A; --heat-5: #FF5C8A;
        --bg-card: var(--surface); --bg-elevated: var(--surface-2); --border: var(--line); --border-bright: var(--line-2);
        --text: var(--ink); --muted: var(--ink-3); --muted2: var(--ink-2);
      }
      /* ── Cream (warm light mode) ── */
      [data-theme="cream"] {
        --bg: #F4F0E7; --bg-2: #ECE7DB; --surface: #FBF8F2; --surface-2: #F0EBDF;
        --line: rgba(20,16,8,0.09); --line-2: rgba(20,16,8,0.15);
        --ink: #1A1712; --ink-2: #6B6557; --ink-3: #9A9384;
        --green: #0E7A4B; --green-dim: #0a5f3a; --green-glow: rgba(14,122,75,0.20); --green-bg: rgba(14,122,75,0.10);
        --crimson: #C8364B; --crimson-dim: #a82f41; --amber: #C2851A; --on-accent: #FFFFFF;
        --red: #C8364B; --red-bg: rgba(200,54,75,0.10); --yellow: #C2851A; --terminal-bg: #EBE6DC;
        --heat-0: #1FA864; --heat-1: #78B446; --heat-2: #E0A92E; --heat-3: #E28C32; --heat-4: #D65A46; --heat-5: #D0344B;
        --bg-card: var(--surface); --bg-elevated: var(--surface-2); --border: var(--line); --border-bright: var(--line-2);
        --text: var(--ink); --muted: var(--ink-3); --muted2: var(--ink-2);
      }
      html { scroll-behavior: smooth; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
        transition: background 0.25s ease, color 0.25s ease;
      }
      .mono { font-family: var(--mono); }
      .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); background-clip: padding-box; }
      ::selection { background: var(--green); color: var(--on-accent); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
