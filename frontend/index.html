<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BestFly — Stop overpaying for flights</title>
    <meta name="description" content="Split-ticket price intelligence. Find flight loopholes the airlines don't want you to know about." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root, [data-theme="dark"] {
        /* Surfaces */
        --bg:        #08080F;
        --bg-2:      #0B0B16;
        --surface:   #12121F;
        --surface-2: #181826;
        --line:      rgba(255,255,255,0.07);
        --line-2:    rgba(255,255,255,0.12);
        /* Text */
        --ink:   #ECECF5;
        --ink-2: #9A9AB0;
        --ink-3: #5C5C72;
        /* Accents */
        --green:       #00FF88;
        --green-dim:   #00cc6e;
        --green-glow:  rgba(0,255,136,0.22);
        --green-bg:    rgba(0,255,136,0.10);
        --crimson:     #FF4D63;
        --crimson-dim: #b3324a;
        --amber:       #FFC83D;
        --on-accent:   #04150c;
        --red:         #FF4D63;
        --red-bg:      rgba(255,77,99,0.10);
        --yellow:      #FFC83D;
        --terminal-bg: #050510;
        /* Heat ramp */
        --heat-0: #00FF88;
        --heat-1: #7CF06B;
        --heat-2: #D6E84F;
        --heat-3: #FFC83D;
        --heat-4: #FF8A4D;
        --heat-5: #FF4D63;
        /* Type */
        --font: 'Space Grotesk', system-ui, sans-serif;
        --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
        /* Radius */
        --r-sm:   8px;
        --r-md:   12px;
        --r-lg:   18px;
        --r-pill: 999px;
        /* Legacy aliases */
        --bg-card:       var(--surface);
        --bg-elevated:   var(--surface-2);
        --border:        var(--line);
        --border-bright: var(--line-2);
        --text:          var(--ink);
        --muted:         var(--ink-3);
        --muted2:        var(--ink-2);
      }
      [data-theme="cream"] {
        --bg:        #F7F4EE;
        --bg-2:      #F0EDE6;
        --surface:   #EDEAE2;
        --surface-2: #E4E0D6;
        --line:      rgba(0,0,0,0.08);
        --line-2:    rgba(0,0,0,0.14);
        --ink:   #1A1A2E;
        --ink-2: #5A5A72;
        --ink-3: #9A9AB0;
        --green:       #007A50;
        --green-dim:   #005A3C;
        --green-glow:  rgba(0,122,80,0.18);
        --green-bg:    rgba(0,122,80,0.10);
        --crimson:     #C0392B;
        --crimson-dim: #922b21;
        --amber:       #B7860C;
        --on-accent:   #FFFFFF;
        --red:         #C0392B;
        --red-bg:      rgba(192,57,43,0.10);
        --yellow:      #B7860C;
        --terminal-bg: #E8E4DC;
        --heat-0: #007A50;
        --heat-1: #3DA05A;
        --heat-2: #7EC050;
        --heat-3: #C0A020;
        --heat-4: #D0601A;
        --heat-5: #C0392B;
        --bg-card:       var(--surface);
        --bg-elevated:   var(--surface-2);
        --border:        var(--line);
        --border-bright: var(--line-2);
        --text:          var(--ink);
        --muted:         var(--ink-3);
        --muted2:        var(--ink-2);
      }
      html { scroll-behavior: smooth; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
        transition: background 0.25s ease, color 0.25s ease;
      }
      .mono { font-family: var(--mono); }
      .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); background-clip: padding-box; }
      ::selection { background: var(--green); color: var(--on-accent); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
